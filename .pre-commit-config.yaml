repos:
- repo: https://github.com/astral-sh/ruff-pre-commit
  rev: v0.15.21
  hooks:
    - id: ruff-check
      name: "ruff check (isort)"
      args: ["--select", "I", "--fix"]
    - id: ruff-check
      args: ["--fix"]
    - id: ruff-format

- repo: https://github.com/codespell-project/codespell
  rev: v2.4.2  # v2.4.1
  hooks:
  - id: codespell
    exclude: >
        (?x)^(
            .*go\.sum
        )$

- repo: https://github.com/golangci/golangci-lint
  rev: v2.12.2
  hooks:
  - id: golangci-lint
    name: lint
    entry: bash -c 'cd go && golangci-lint run --fix --timeout 5m'
    types_or: [go, go-mod]

- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v6.0.0
  hooks:
  - id: check-added-large-files
    args: ["--enforce-all"]
  - id: check-case-conflict
  - id: check-executables-have-shebangs
  - id: check-yaml
  - id: detect-private-key
  - id: end-of-file-fixer
    exclude: '\.sln$'
  - id: mixed-line-ending
    args: [--fix=lf]
    exclude: '\.(bat|sln)$'
  - id: trailing-whitespace

- repo: https://github.com/adbc-drivers/dev
  rev: 6a41519f9af534d9582153c4a8e93bfe3d62b5fa
  hooks:
  - id: rat

- repo: local
  hooks:
  - id: cargo fmt
    name: cargo fmt
    language: system
    types: [rust]
    entry: bash -c 'cd rust && cargo +stable fmt --all'
    pass_filenames: false
  - id: cargo clippy
    name: cargo clippy
    language: system
    types: [rust]
    entry: bash -c 'cd rust && cargo clippy --all-targets -- -D warnings'
    pass_filenames: false
