# Bug-fix task for adbc-drivers/databricks (C#). Copy to .bot/config.yaml.
# The engine (databricks-bot-engine) is INSTALLED by the workflow; this file is
# pure DATA. Single-repo: the agent edits THIS repo (TEST_REPO_ROOT = checkout)
# and the fix PR is opened here, anchored on the triggering issue.
name: csharp_bugfix
marker_namespace: engineer-bot-csharp-bugfix
branch_prefix: ai/bugfix-                 # fix branches: ai/bugfix-<issue-number>
bot_login_prefix: peco-engineer-bot       # <-- your engineer-bot App's login prefix

# safe_path denylist (relative to repo root). .git + the secret-scanner allowlist
# at minimum. NOTE (security): csharp/src is NOT denied — the agent must edit the
# code it fixes. But .github + .bot ARE denied as defense-in-depth: a bug fix
# never needs to write the bot's own CI/workflows or config/prompts, and both the
# author and follow-up system prompts already forbid it. Enforcing it in-sandbox
# means a prompt-injected issue/review body cannot induce such edits at all,
# rather than relying solely on a reviewer spotting them. The human PR-review gate
# remains the backstop — reviewers should still scrutinize any .bot/.github diffs.
denied_subpaths:
  - .git
  - .gitleaksignore
  - .github
  - .bot
  # csharp/hiveserver2 is a SEPARATE repo (git submodule -> adbc-drivers/hiveserver2).
  # Edits there cannot be committed to a parent-repo PR, so deny them. The author
  # prompt instructs the agent to STOP and report `blocked` (naming the hiveserver2
  # file/symbol) when a fix would require changing it — the issue-comment step then
  # posts that reason back to the issue.
  - csharp/hiveserver2

# The opened fix PR. publish is issue-driven, so {issue_number}/{issue_title}/{issue_url}
# are the TRIGGERING ISSUE's number/title/url (NOT a PR). "Fixes #" auto-closes
# the issue on merge.
pr_title_template: "fix(csharp): {issue_title} (#{issue_number})"
commit_message_template: "fix(csharp): address issue #{issue_number}"
pr_body_template: |-
  ## Summary

  Automated fix for [#{issue_number}]({issue_url}) — {issue_title}.

  {summary}

  ## Files changed
  {files_changed}

  ## Test plan
  {test_plan}

  Fixes #{issue_number}

  🤖 Generated by engineer-bot (bug-fix flow)

# Bash sandbox: an argv-PREFIX allowlist. PIN subcommands — a bare ("dotnet",)
# would allow `dotnet tool install`/`dotnet nuget add source`/`dotnet run
# --project /abs`. cat/ls deliberately ABSENT (they read arbitrary absolute
# paths); the agent uses read_file/glob/grep (safe_path-enforced).
bash_timeout: 1800
bash_allowlist:
  - [dotnet, build]
  - [dotnet, test]
  - [dotnet, restore]
  - [git, diff, HEAD]
  - [git, diff, --cached]
  - [git, status]

# Author phase: prompt rendered from the template; tokens are the ISSUE (the bug
# to fix). No driver PR, no SOURCE_PR_* — this is single-repo, issue-driven.
author:
  user_prompt_template: prompts/author_user.md
  env_tokens:                 # {{issue_*}} in author_user.md  <-  env vars
    issue_number: ISSUE_NUMBER
    issue_title:  ISSUE_TITLE
    issue_body:   ISSUE_BODY
  # Learning log: .claude/knowledge/learning.md — NO config key needed. BOTH bots
  # auto-read everything under .claude/knowledge/**/*.md via their conventions
  # readers (the engineer's read_repo_conventions + the reviewer's
  # aggregate_repo_rules), so past lessons inform each bot with zero wiring. One
  # log for the whole repo for now; can split per-language later.
  # (Trade-off vs. the author.knowledge_log key: via the glob the log is delivered
  # oldest-first and byte-capped like other conventions, NOT newest-first — fine
  # while the log is small; add author.knowledge_log back if it grows past the cap
  # and recent lessons start getting truncated. Auto-append on merge is a separate
  # follow-up: needs a `retrospective:` block + a learning workflow, neither wired
  # yet — grow this file by hand for now.)

# Follow-up phase (engineer-bot-followup.yml): NO config block. The engine reads
# no `followup:` key — bot_config.py parses only `author:` + the shared top-level
# keys. The follow-up phase uses .bot/prompts/followup_system.md as its system
# prompt, builds its user prompt from the PR review thread, and reuses
# author.knowledge_log — so a `followup:` block here would be dead config.
# (prompts/followup_user.md is likewise unrendered by the engine.)

# The bug-fix flow (engine: flows/bug_fix.py): the engine appends the
# "write a failing test → fix the CODE → re-run until green; don't weaken the
# test" instruction and forces a {outcome, reason, red_green_tests} result.
flow: bug-fix
