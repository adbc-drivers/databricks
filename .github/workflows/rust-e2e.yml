name: Rust E2E Tests

on:
  push:
    branches:
      - main
    paths:
      - "rust/**"
      - .github/workflows/rust-e2e.yml
  pull_request:
    branches:
      - main
    paths:
      - "rust/**"
      - .github/workflows/rust-e2e.yml

concurrency:
  group: ${{ github.repository }}-${{ github.head_ref || github.sha }}-rust-e2e
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  proxy:
    name: "E2E/Proxy"
    runs-on: ubuntu-latest
    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_HTTP_PATH: ${{ secrets.TEST_PECO_WAREHOUSE_HTTP_PATH }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}

    services:
      # Unauthenticated forward proxy
      squid:
        image: ubuntu/squid:latest
        ports:
          - 3128:3128

      # Authenticated forward proxy (basic auth)
      squid-auth:
        image: ubuntu/squid:latest
        ports:
          - 3129:3128
        volumes:
          - ${{ github.workspace }}/rust/ci/proxy/squid-auth.conf:/etc/squid/squid.conf
          - ${{ github.workspace }}/rust/ci/proxy/htpasswd:/etc/squid/htpasswd

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Run proxy E2E tests
        working-directory: rust
        run: cargo test --test proxy_e2e -- --ignored --nocapture

      - name: Verify proxy was used (unauthenticated)
        if: always()
        run: |
          docker logs $(docker ps -q --filter "publish=3128") 2>&1 \
            | grep -i "CONNECT" \
            || echo "WARNING: No CONNECT entries found in squid logs"

      - name: Verify proxy was used (authenticated)
        if: always()
        run: |
          docker logs $(docker ps -q --filter "publish=3129") 2>&1 \
            | grep -i "CONNECT" \
            || echo "WARNING: No CONNECT entries found in squid-auth logs"

  # Future e2e jobs can be added here, e.g.:
  # cloudfetch:
  #   name: "E2E/CloudFetch"
  #   ...
