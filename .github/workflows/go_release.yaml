# Modified for fork release (no azure-prod environment required).
# Original auto-generated by adbc-gen-workflow (see adbc-drivers/dev).

name: Go Release

on:
  push:
    tags:
      - "go/v**"

  workflow_dispatch: {}

concurrency:
  group: ${{ github.repository }}-${{ github.ref }}-go-release
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  build:
    name: "Build databricks/${{ matrix.platform }}_${{ matrix.arch }}"
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - { platform: linux, arch: amd64, runner: ubuntu-latest }
          - { platform: linux, arch: arm64, runner: ubuntu-24.04-arm }
          - { platform: macos, arch: arm64, runner: macos-latest }
          - { platform: windows, arch: amd64, runner: windows-latest }
    permissions:
      contents: read
      packages: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5  # v6.2.0
        with:
          cache-dependency-path: go/go.sum
          check-latest: true
          go-version-file: go/go.mod

      - uses: prefix-dev/setup-pixi@82d477f15f3a381dbcc8adc1206ce643fe110fb7  # v0.9.3
        with:
          pixi-version: v0.63.2
          run-install: false

      - name: Install dev tools
        working-directory: go
        run: |
          pixi install

      - name: Log in to ghcr.io
        if: runner.os == 'Linux'
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build Library
        working-directory: go
        run: |
          if [[ -f ci/scripts/pre-build.sh ]]; then
            ./ci/scripts/pre-build.sh release ${{ matrix.platform }} ${{ matrix.arch }}
          fi
          set -a
          if [[ -f .env.release ]]; then
            source .env.release
          fi
          set +a
          pixi run adbc-make check CI=true VERBOSE=true DRIVER=databricks IMPL_LANG=go

      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # v6.0.0
        with:
          name: drivers-${{ matrix.platform }}-${{ matrix.arch }}
          path: "go/build/libadbc_driver_databricks.*"
          retention-days: 2

  package:
    name: "Generate Packages"
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5  # v6.2.0
        with:
          check-latest: true
          go-version: "stable"

      - uses: prefix-dev/setup-pixi@82d477f15f3a381dbcc8adc1206ce643fe110fb7  # v0.9.3
        with:
          pixi-version: v0.63.2
          run-install: false

      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131  # v7.0.0
        with:
          pattern: "drivers-*"
          path: "~/drivers"

      - name: Install tools
        working-directory: go
        run: |
          # XXX: can't install go-licenses under go 1.25
          # https://github.com/google/go-licenses/issues/312
          git clone --depth=1 https://github.com/google/go-licenses
          git config --global --add 'url.https://github.com/.insteadOf' ssh://git@github.com/
          pushd go-licenses
          go get -u
          # Silent break: https://github.com/spf13/cobra/pull/2303
          # Manually edit the go.mod to get around this for now
          sed -i 's|github.com/spf13/pflag v1.0.8|github.com/spf13/pflag v1.0.7|g' go.mod
          go mod tidy
          go install .
          popd

      - name: Generate packages
        working-directory: go
        run: |
          pixi install

          pixi run adbc-gen-package \
            --name databricks \
            --root $(pwd) \
            --manifest-template $(pwd)/manifest.toml \
            ${{ (inputs.release && '--release') || '' }}\
            -o ~/packages \
            ~/drivers/drivers-*-*/

          ls ~/packages

      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # v6.0.0
        with:
          name: all-packages
          path: ~/packages
          retention-days: 7

  release:
    name: "Release"
    runs-on: ubuntu-latest
    needs:
      - package
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5  # v6.2.0
        with:
          check-latest: true
          go-version: "stable"

      - uses: prefix-dev/setup-pixi@82d477f15f3a381dbcc8adc1206ce643fe110fb7  # v0.9.3
        with:
          pixi-version: v0.63.2
          run-install: false

      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131  # v7.0.0
        with:
          name: "all-packages"
          path: "~/packages"

      - name: Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        working-directory: go
        run: |
          ref=${{ github.ref }}
          tag=${ref#"refs/tags/"}
          pixi run release $(pwd) $tag
          gh release upload $tag $(find ~/packages -name '*.tar.gz') $(find ~/packages -name 'manifest.yaml') $(find ~/packages -name '*.md')

      - name: Release (dry-run)
        if: github.event_name != 'push' || !startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        working-directory: go
        run: |
          git tag go/v1000.0.0
          tag=go/v1000.0.0

          pixi run release --dry-run $(pwd) $tag
          echo gh release upload $tag $(find ~/packages -name '*.tar.gz') $(find ~/packages -name 'manifest.yaml') $(find ~/packages -name '*.md')
