# Reviewer-bot — reviews PRs in this repo and posts inline findings.
#
# ⚠️ DRAFT / NOT YET FUNCTIONAL. Requires (see the PR description):
#   - secrets BOT_ENGINE_PAT, REVIEW_BOT_APP_ID/PRIVATE_KEY (DATABRICKS_HOST + DATABRICKS_TOKEN already exist in adbc CI)
#   - engine ref (pinned below to eric-wang-1990/databricks-bot-engine@main — the
#     dedicated engine repo; PRIVATE for now, so BOT_ENGINE_PAT is scoped to it);
#     when that repo goes public, drop the PAT (anonymous install); repin to a tag later
#
# Self-contained (a cross-org `uses:` of the hub's internal composite action does
# NOT work, so the run steps are inline). Posts findings under the review-bot App
# identity; it never merges. It also reviews the bug-fix bot's OWN fix PRs, which
# closes the reviewer -> engineer loop.
#
# When the engine is published publicly: drop the PAT (anonymous git / PyPI).
name: Reviewer Bot

on:
  pull_request:
    # `labeled` is included so adding `review-bot` (or `engineer-bot`) to an
    # already-open PR triggers a review immediately, not just on the next push.
    types: [opened, synchronize, reopened, ready_for_review, labeled]

permissions:
  contents: read
  pull-requests: write   # post inline review findings
  id-token: write        # model OIDC, if your endpoint uses it

concurrency:
  # Re-review on each push; only the latest matters, so cancel stale runs.
  group: reviewer-bot-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    # Non-fork, non-draft, OPTED-IN PRs only:
    #  - fork PRs must never see the LLM/engine secrets; drafts aren't ready.
    #  - label gate: review only PRs carrying `review-bot` (a maintainer opts a
    #    PR in) OR `engineer-bot`. The OR keeps the loop automatic — the bug-fix
    #    bot's own fix PRs carry `engineer-bot` (publish auto-applies it), so they
    #    are reviewed without anyone hand-labeling each one. Without a label the
    #    reviewer stays silent, so it doesn't comment on every PR in the repo.
    if: >-
      github.event.pull_request.draft == false
      && github.event.pull_request.head.repo.fork == false
      && (
        contains(github.event.pull_request.labels.*.name, 'review-bot')
        || contains(github.event.pull_request.labels.*.name, 'engineer-bot')
      )
    runs-on: ubuntu-latest   # VERIFY: a protected runner if model creds come from the runner env
    timeout-minutes: 30
    steps:
      - name: Mint review-bot App token
        id: token
        uses: actions/create-github-app-token@v2   # VERIFY: pin to a SHA
        with:
          app-id: ${{ secrets.REVIEW_BOT_APP_ID }}
          private-key: ${{ secrets.REVIEW_BOT_APP_PRIVATE_KEY }}

      - name: Checkout PR (merge ref)
        uses: actions/checkout@v4   # VERIFY: pin to a SHA
        with:
          token: ${{ steps.token.outputs.token }}
          fetch-depth: 0   # reviewer diffs head against base

      - name: Setup Python
        uses: actions/setup-python@v6   # VERIFY: pin
        with:
          python-version: '3.11'

      - name: Install bot engine (interim PAT git-install) + Claude SDK/CLI
        env:
          ENGINE_PAT: ${{ secrets.BOT_ENGINE_PAT }}
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          # The dedicated engine repo (PRIVATE for now → install via the PAT). Drop the
          # `x-access-token:${ENGINE_PAT}@` prefix once it's public; repin @main to a tag later.
          pip install "databricks-bot-engine @ git+https://x-access-token:${ENGINE_PAT}@github.com/eric-wang-1990/databricks-bot-engine@main"
          pip install claude-agent-sdk             # VERIFY: exact package the engine imports
          npm install -g @anthropic-ai/claude-code # VERIFY: the CLI the SDK spawns

      - name: Run reviewer
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          GH_TOKEN: ${{ steps.token.outputs.token }}
          # Model serving on the same Databricks workspace as adbc's CI: DATABRICKS_HOST is
          # the bare hostname hosting the databricks-claude-opus-4-8 serving endpoint;
          # DATABRICKS_TOKEN authenticates it (Bearer). Both already exist as adbc CI secrets.
          MODEL_ENDPOINT:   https://${{ secrets.DATABRICKS_HOST }}/serving-endpoints/databricks-claude-opus-4-8/invocations
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
          DRY_RUN: 'false'
          RUNNER_TEMP: ${{ runner.temp }}
        run: python -m databricks_bot_engine.reviewer_bot.run_review
