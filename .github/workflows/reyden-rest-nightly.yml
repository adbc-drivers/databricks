# Nightly E2E run against the Reyden REST warehouse.
#
# Self-contained workflow: the generic e2e-tests.yml does not carry any
# Reyden-specific routing (Reyden rejects DDL on the SQL statement API), so
# all Reyden-aware setup, test-config emission, test execution, and result
# publishing lives in this file. Setup/teardown talks to a regular DBSQL
# warehouse (TEST_PECO_WAREHOUSE_HTTP_PATH) for the DDL the Reyden warehouse
# would refuse; only the actual test run targets the Reyden warehouse
# (TEST_PECO_REYDEN_HTTP_PATH).
name: Reyden REST Nightly E2E

on:
  schedule:
    # 02:00 UTC daily
    - cron: '0 2 * * *'
  workflow_dispatch:

# publish-dashboard pushes the parsed test results to the gh-pages branch.
permissions:
  contents: write

concurrency:
  group: ${{ github.repository }}-reyden-rest-nightly
  cancel-in-progress: false

jobs:
  reyden-rest-nightly:
    name: "Reyden REST Nightly E2E"
    runs-on: ubuntu-latest
    env:
      DATABRICKS_SERVER_HOSTNAME: ${{ secrets.DATABRICKS_HOST }}
      # Reyden warehouse — used only for test execution (no DDL support)
      DATABRICKS_HTTP_PATH: ${{ secrets.TEST_PECO_REYDEN_HTTP_PATH }}
      # Regular DBSQL warehouse — used for schema/table setup and teardown
      SETUP_HTTP_PATH: ${{ secrets.TEST_PECO_WAREHOUSE_HTTP_PATH }}
      DATABRICKS_TEST_CLIENT_ID: ${{ secrets.DATABRICKS_TEST_CLIENT_ID }}
      DATABRICKS_TEST_CLIENT_SECRET: ${{ secrets.DATABRICKS_TEST_CLIENT_SECRET }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9  # v4.3.1
        with:
          dotnet-version: '8.0.x'

      - name: Generate OAuth access token
        id: oauth
        run: |
          OAUTH_RESPONSE=$(curl -s -X POST "https://${{ env.DATABRICKS_SERVER_HOSTNAME }}/oidc/v1/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=client_credentials" \
            -d "client_id=${{ env.DATABRICKS_TEST_CLIENT_ID }}" \
            -d "client_secret=${{ env.DATABRICKS_TEST_CLIENT_SECRET }}" \
            -d "scope=sql")
          OAUTH_TOKEN=$(echo "$OAUTH_RESPONSE" | python3 -c "import sys, json; print(json.load(sys.stdin)['access_token'])")
          if [ -z "$OAUTH_TOKEN" ]; then
            echo "ERROR: Failed to generate OAuth token"
            exit 1
          fi
          echo "::add-mask::$OAUTH_TOKEN"
          echo "OAUTH_TOKEN=$OAUTH_TOKEN" >> $GITHUB_OUTPUT

      - name: Compute per-run schema name
        id: schema
        run: |
          PER_RUN_SCHEMA="adbc_testing_run_${{ github.run_id }}_${{ github.run_attempt }}_rest"
          echo "PER_RUN_SCHEMA=$PER_RUN_SCHEMA" >> $GITHUB_OUTPUT
          echo "Per-run schema: main.$PER_RUN_SCHEMA"
          # Use the regular warehouse ID for setup operations
          WAREHOUSE_ID=$(echo "${{ env.SETUP_HTTP_PATH }}" | awk -F/ '{print $NF}')
          if [ -z "$WAREHOUSE_ID" ]; then
            echo "ERROR: Could not extract warehouse id from SETUP_HTTP_PATH"
            exit 1
          fi
          echo "WAREHOUSE_ID=$WAREHOUSE_ID" >> $GITHUB_OUTPUT

      - name: Provision per-run schema
        env:
          OAUTH_TOKEN: ${{ steps.oauth.outputs.OAUTH_TOKEN }}
          PER_RUN_SCHEMA: ${{ steps.schema.outputs.PER_RUN_SCHEMA }}
          WAREHOUSE_ID: ${{ steps.schema.outputs.WAREHOUSE_ID }}
        run: |
          set -e
          STATEMENT="CREATE SCHEMA IF NOT EXISTS main.${PER_RUN_SCHEMA}"
          PAYLOAD=$(jq -n --arg w "$WAREHOUSE_ID" --arg s "$STATEMENT" '{warehouse_id: $w, statement: $s, wait_timeout: "30s"}')
          RESPONSE=$(curl -sS -X POST "https://${{ env.DATABRICKS_SERVER_HOSTNAME }}/api/2.0/sql/statements" \
            -H "Authorization: Bearer $OAUTH_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")
          STATUS=$(echo "$RESPONSE" | python3 -c "import sys, json; print(json.load(sys.stdin).get('status', {}).get('state', ''))")
          if [ "$STATUS" != "SUCCEEDED" ]; then
            echo "ERROR: CREATE SCHEMA failed (status=$STATUS)"
            echo "Response: $RESPONSE"
            exit 1
          fi
          echo "Created schema: main.${PER_RUN_SCHEMA}"

      - name: Seed test data
        env:
          OAUTH_TOKEN: ${{ steps.oauth.outputs.OAUTH_TOKEN }}
          PER_RUN_SCHEMA: ${{ steps.schema.outputs.PER_RUN_SCHEMA }}
          WAREHOUSE_ID: ${{ steps.schema.outputs.WAREHOUSE_ID }}
          DATABRICKS_SERVER_HOSTNAME: ${{ env.DATABRICKS_SERVER_HOSTNAME }}
        run: |
          python3 - <<'PYEOF'
          import json, os, re, sys, urllib.request

          with open("csharp/test/Resources/Databricks.sql") as f:
              content = f.read()
          content = re.sub(r"^\s*--.*$", "", content, flags=re.MULTILINE)
          full_table = f"main.{os.environ['PER_RUN_SCHEMA']}.adbc_testing_table"
          content = content.replace("{ADBC_CATALOG}.{ADBC_DATASET}.{ADBC_TABLE}", full_table)
          statements = [s.strip() for s in content.split(";") if s.strip()]

          host = os.environ["DATABRICKS_SERVER_HOSTNAME"]
          token = os.environ["OAUTH_TOKEN"]
          warehouse = os.environ["WAREHOUSE_ID"]
          url = f"https://{host}/api/2.0/sql/statements"

          for i, stmt in enumerate(statements, 1):
              payload = json.dumps({
                  "warehouse_id": warehouse,
                  "statement": stmt,
                  "wait_timeout": "30s",
              }).encode()
              req = urllib.request.Request(
                  url, data=payload,
                  headers={"Authorization": f"Bearer {token}", "Content-Type": "application/json"},
                  method="POST",
              )
              with urllib.request.urlopen(req) as resp:
                  body = json.loads(resp.read())
              state = body.get("status", {}).get("state", "")
              if state != "SUCCEEDED":
                  print(f"ERROR: statement {i} failed (state={state})")
                  print(f"Statement: {stmt[:200]}")
                  print(f"Response: {json.dumps(body, indent=2)}")
                  sys.exit(1)
              print(f"OK [{i}/{len(statements)}]: {stmt[:80].replace(chr(10), ' ')}")
          print(f"Seeded {len(statements)} statements into main.{os.environ['PER_RUN_SCHEMA']}")

          # Create an empty mutable table for INSERT tests. Reyden supports INSERT but
          # not CREATE TABLE, so the table has to be pre-created here using the regular
          # warehouse before tests start writing to it.
          schema = os.environ["PER_RUN_SCHEMA"]
          mutable_stmt = f"CREATE TABLE IF NOT EXISTS main.{schema}.adbc_testing_mutable (id INT, name STRING) USING DELTA"
          payload = json.dumps({"warehouse_id": warehouse, "statement": mutable_stmt, "wait_timeout": "30s"}).encode()
          req = urllib.request.Request(url, data=payload,
              headers={"Authorization": f"Bearer {token}", "Content-Type": "application/json"}, method="POST")
          with urllib.request.urlopen(req) as resp:
              body = json.loads(resp.read())
          if body.get("status", {}).get("state", "") != "SUCCEEDED":
              print(f"ERROR: CREATE mutable table failed: {json.dumps(body, indent=2)}")
              sys.exit(1)
          print(f"Created mutable table: main.{schema}.adbc_testing_mutable")
          PYEOF

      - name: Create Databricks config file
        env:
          PER_RUN_SCHEMA: ${{ steps.schema.outputs.PER_RUN_SCHEMA }}
        run: |
          mkdir -p ~/.databricks
          cat > ~/.databricks/connection.json << EOF
          {
            "uri": "https://${{ env.DATABRICKS_SERVER_HOSTNAME }}${{ env.DATABRICKS_HTTP_PATH }}",
            "auth_type": "oauth",
            "grant_type": "client_credentials",
            "client_id": "${{ env.DATABRICKS_TEST_CLIENT_ID }}",
            "client_secret": "${{ env.DATABRICKS_TEST_CLIENT_SECRET }}",
            "scope": "sql",
            "access_token": "${{ steps.oauth.outputs.OAUTH_TOKEN }}",
            "type": "databricks",
            "protocol": "rest",
            "catalog": "main",
            "db_schema": "${PER_RUN_SCHEMA}",
            "query": "SELECT * FROM main.${PER_RUN_SCHEMA}.adbc_testing_table",
            "expectedResults": 12,
            "isCITesting": true,
            "isReadOnly": true,
            "mutableTable": "main.${PER_RUN_SCHEMA}.adbc_testing_mutable",
            "tracePropagationEnabled": "true",
            "traceParentHeaderName": "traceparent",
            "traceStateEnabled": "false",
            "metadata": {
              "catalog": "main",
              "schema": "${PER_RUN_SCHEMA}",
              "table": "adbc_testing_table",
              "expectedColumnCount": 19
            }
          }
          EOF
          echo "DATABRICKS_TEST_CONFIG_FILE=$HOME/.databricks/connection.json" >> $GITHUB_ENV

      - name: Build
        shell: bash
        run: |
          ./ci/scripts/csharp_build.sh "${{ github.workspace }}"

      - name: Run E2E tests
        shell: bash
        run: |
          export DATABRICKS_TEST_CONFIG_FILE="$HOME/.databricks/connection.json"
          # Nightly only — skip unit tests (Tests.Unit namespace). Always emit a
          # TRX so the dashboard can parse pass/fail/skip + per-test failure
          # detail; set -e in the script still writes the TRX before the
          # non-zero exit and the upload step is always().
          ./ci/scripts/csharp_test_databricks_e2e.sh "${{ github.workspace }}" \
            --filter FullyQualifiedName!~Tests.Unit \
            --logger "trx;LogFileName=results-rest.trx" \
            --results-directory "${{ github.workspace }}/TestResults"

      - name: Upload test results (TRX)
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: e2e-trx-rest
          path: ${{ github.workspace }}/TestResults/*.trx
          if-no-files-found: warn
          retention-days: 7

      # Always run, even on test failure or job cancellation, so we don't leak
      # schemas in the workspace.
      - name: Drop per-run schema
        if: always() && steps.schema.outputs.PER_RUN_SCHEMA != ''
        env:
          OAUTH_TOKEN: ${{ steps.oauth.outputs.OAUTH_TOKEN }}
          PER_RUN_SCHEMA: ${{ steps.schema.outputs.PER_RUN_SCHEMA }}
          WAREHOUSE_ID: ${{ steps.schema.outputs.WAREHOUSE_ID }}
        run: |
          STATEMENT="DROP SCHEMA IF EXISTS main.${PER_RUN_SCHEMA} CASCADE"
          PAYLOAD=$(jq -n --arg w "$WAREHOUSE_ID" --arg s "$STATEMENT" '{warehouse_id: $w, statement: $s, wait_timeout: "30s"}')
          RESPONSE=$(curl -sS -X POST "https://${{ env.DATABRICKS_SERVER_HOSTNAME }}/api/2.0/sql/statements" \
            -H "Authorization: Bearer $OAUTH_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")
          STATUS=$(echo "$RESPONSE" | python3 -c "import sys, json; print(json.load(sys.stdin).get('status', {}).get('state', ''))")
          if [ "$STATUS" != "SUCCEEDED" ]; then
            # Don't fail the job on cleanup error — leaked schemas can be
            # garbage-collected later. But surface the failure.
            echo "WARNING: DROP SCHEMA failed (status=$STATUS)"
            echo "Response: $RESPONSE"
          else
            echo "Dropped schema: main.${PER_RUN_SCHEMA}"
          fi

  # Parse the TRX results and publish an append-only history to the gh-pages
  # branch (served at https://adbc-drivers.github.io/databricks/e2e-nightly/).
  # Runs always() so a failed test run is still recorded — surfacing failures
  # is the whole point of the page.
  publish-dashboard:
    name: Publish E2E Dashboard
    needs: reyden-rest-nightly
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0

      - name: Download test results
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          pattern: e2e-trx-*
          path: trx

      - name: Build dashboard and push to gh-pages
        env:
          # The Reyden nightly always exercises the read-only Reyden warehouse,
          # so the parsed run record is tagged read-only for the dashboard.
          RUN_READ_ONLY: 'true'
        run: |
          set -e
          shopt -s nullglob
          RUN_TIMESTAMP="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          export RUN_TIMESTAMP

          dirs=(trx/e2e-trx-*)
          if [ ${#dirs[@]} -eq 0 ]; then
            echo "No TRX artifacts found — nothing to publish."
            exit 0
          fi

          git fetch origin gh-pages
          git worktree add /tmp/ghp gh-pages
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          for d in "${dirs[@]}"; do
            proto="${d#trx/e2e-trx-}"
            export RUN_PROTOCOL="$proto"
            echo "::group::Parsing $proto"
            python3 .github/scripts/parse-trx-to-json.py "/tmp/record-${proto}.json" "$d"
            python3 .github/scripts/update-e2e-dashboard.py \
              "/tmp/record-${proto}.json" /tmp/ghp/e2e-nightly .github/e2e-dashboard/index.html
            echo "::endgroup::"
          done

          cd /tmp/ghp
          git add e2e-nightly
          if git diff --cached --quiet; then
            echo "No dashboard changes to commit."
          else
            git commit -m "e2e-nightly: record run ${GITHUB_RUN_ID} (${GITHUB_REF_NAME})"
            git push origin gh-pages
            echo "Published: https://adbc-drivers.github.io/databricks/e2e-nightly/"
          fi
