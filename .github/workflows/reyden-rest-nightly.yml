name: Reyden REST Nightly E2E

on:
  schedule:
    # 02:00 UTC daily
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  reyden-rest-nightly:
    uses: ./.github/workflows/e2e-tests.yml
    with:
      protocol: rest
    secrets:
      execution_http_path: ${{ secrets.TEST_PECO_REYDEN_HTTP_PATH }}
